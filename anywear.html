<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANYWEAR</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f3f3f3;
  color:#111;
}

/* HEADER */
.header{
  height:72px;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px;
}

.logo{
  font-size:24px;
  font-weight:bold;
  letter-spacing:1px;
}

.profile{
  display:flex;
  align-items:center;
  gap:12px;
}

.profile img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  cursor:pointer;
  border:2px solid #fff;
}

.profile span{
  cursor:pointer;
}

/* LAYOUT */
.container{
  display:flex;
}

.sidebar{
  width:230px;
  background:#fff;
  height:calc(100vh - 72px);
  border-right:1px solid #ddd;
  padding:20px;
}

.menu{
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.2s;
}

.menu:hover{
  background:#ececec;
}

.menu.active{
  background:#000;
  color:#fff;
}

.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:24px;
  margin-bottom:25px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

/* SECTION */
.section{
  display:none;
}

.section.active{
  display:block;
}

/* BUTTON */
.btn{
  background:#000;
  color:#fff;
  padding:11px 16px;
  border-radius:8px;
  display:inline-block;
  margin-top:10px;
  cursor:pointer;
  border:none;
}

.btn:hover{
  opacity:.9;
}

/* INPUT */
input,
textarea,
select{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  margin-top:8px;
  margin-bottom:12px;
}

/* CLOSET */
.top-filter{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.filter-btn{
  padding:8px 14px;
  background:#e8e8e8;
  border-radius:999px;
  cursor:pointer;
  font-size:14px;
}

.filter-btn.active{
  background:#000;
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:18px;
}

.item{
  background:#fff;
  border:2px solid #d8d8d8;
  border-radius:14px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:.2s;
}

.item:hover{
  transform:translateY(-3px);
  border-color:#000;
}

.item img{
  width:100%;
  height:180px;
  object-fit:contain;
  background:#fafafa;
}

.item-info{
  padding:12px;
}

.item-title{
  font-weight:bold;
  margin-bottom:4px;
}

.item-sub{
  font-size:13px;
  color:#666;
}

.favorite{
  position:absolute;
  top:10px;
  left:10px;
  background:#fff;
  border-radius:50%;
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:14px;
}

.delete-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#000;
  color:#fff;
  border:none;
  width:24px;
  height:24px;
  border-radius:50%;
  cursor:pointer;
}

/* PRESET */
.preset-list{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:18px;
}

.preset-card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  border:1px solid #ddd;
  position:relative;
  cursor:pointer;
}

.preset-cover{
  width:100%;
  height:180px;
  object-fit:cover;
  background:#f1f1f1;
}

.preset-body{
  padding:16px;
}

.preset-name{
  font-size:18px;
  font-weight:bold;
}

.preset-meta{
  font-size:13px;
  color:#666;
  margin-top:6px;
}

/* SLOT */
.slot-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:16px;
  margin-top:20px;
}

.slot{
  background:#f5f5f5;
  border:2px dashed #bbb;
  border-radius:14px;
  min-height:200px;
  padding:10px;
}

.slot h4{
  margin-bottom:10px;
}

.slot img{
  width:100%;
  height:140px;
  object-fit:contain;
  background:#fff;
  border-radius:10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  z-index:999;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.modal.active{
  display:flex;
}

.modal-content{
  background:#fff;
  border-radius:20px;
  padding:24px;
  max-width:900px;
  width:100%;
  max-height:90vh;
  overflow:auto;
  position:relative;
}

.close{
  position:absolute;
  right:15px;
  top:15px;
  width:32px;
  height:32px;
  border:none;
  border-radius:50%;
  background:#000;
  color:#fff;
  cursor:pointer;
}

/* PROFILE */
#previewImage{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  margin-top:10px;
  border:3px solid #ddd;
}

.center-profile-image{
  width:250px;
  height:250px;
  object-fit:cover;
  border-radius:20px;
}

/* SHARE */
.share-box{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">ANYWEAR</div>

  <div class="profile">
    <img
      id="headerProfileImg"
      src="https://via.placeholder.com/100"
      onclick="openProfileImage()"
    >

    <span id="headerName"
      onclick="goProfile()">
      내 프로필
    </span>
  </div>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="menu active"
      onclick="showSection('home',this)">
      홈
    </div>

    <div class="menu"
      onclick="showSection('upload',this)">
      옷 등록
    </div>

    <div class="menu"
      onclick="showSection('closet',this)">
      내 옷장
    </div>

    <div class="menu"
      onclick="showSection('preset',this)">
      착장 프리셋
    </div>

    <div class="menu"
      onclick="showSection('share',this)">
      공유
    </div>

    <div class="menu"
      onclick="showSection('profile',this)">
      내 프로필
    </div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HOME -->
    <div id="home" class="section active">
      <div class="card">
        <h2>오늘의 추천 착장</h2>
        <br>
        <p>캐주얼 스트릿 룩</p>
        <div class="btn">지금 입기</div>
      </div>
    </div>

    <!-- UPLOAD -->
    <div id="upload" class="section">
      <div class="card">

        <h2>옷 등록</h2>

        <input type="file" id="clothImage">

        <img
          id="clothPreview"
          style="width:100px;margin-top:10px;display:none;border-radius:10px;"
        >

        <input type="text"
          id="clothName"
          placeholder="옷 이름">

        <!-- 카테고리 -->
        <select id="clothCategory">
          <option value="상의">상의</option>
          <option value="하의">하의</option>
          <option value="아우터">아우터</option>
          <option value="신발">신발</option>
          <option value="악세서리">악세서리</option>
        </select>

        <input type="text"
          id="clothBrand"
          placeholder="브랜드">

        <!-- 사이즈 -->
        <select id="clothSize">
          <option value="XXS">XXS</option>
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M" selected>M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="XXL">XXL</option>
          <option value="XXXL">XXXL</option>
        </select>

        <!-- 상세 사이즈 -->
        <textarea
          id="clothDetailSize"
          placeholder="상세 사이즈">
        </textarea>

        <input type="text"
          id="clothLink"
          placeholder="브랜드 URL">

        <textarea
          id="clothMemo"
          placeholder="메모">
        </textarea>

        <div class="btn"
          onclick="addCloth()">
          등록하기
        </div>

      </div>
    </div>

    <!-- CLOSET -->
    <div id="closet" class="section">

      <div class="card">

        <h2>내 옷장</h2>

        <div class="top-filter">

          <div class="filter-btn active"
            onclick="filterCategory('전체',this)">
            전체
          </div>

          <div class="filter-btn"
            onclick="filterCategory('상의',this)">
            상의
          </div>

          <div class="filter-btn"
            onclick="filterCategory('하의',this)">
            하의
          </div>

          <div class="filter-btn"
            onclick="filterCategory('아우터',this)">
            아우터
          </div>

          <div class="filter-btn"
            onclick="filterCategory('신발',this)">
            신발
          </div>

          <div class="filter-btn"
            onclick="filterCategory('악세서리',this)">
            악세서리
          </div>

          <div class="filter-btn"
            onclick="showFavorites(this)">
            ★ 즐겨찾기
          </div>

        </div>

        <div id="closetGrid" class="grid"></div>

      </div>
    </div>

    <!-- PRESET -->
    <div id="preset" class="section">

      <div class="card">

        <h2>착장 프리셋</h2>

        <input
          type="text"
          id="presetName"
          placeholder="프리셋 이름">

        <input
          type="file"
          id="presetImage">

        <div class="btn"
          onclick="openPresetBuilder()">
          프리셋 구성하기
        </div>

        <div class="preset-list"
          id="presetList">
        </div>

      </div>
    </div>

    <!-- SHARE -->
    <div id="share" class="section">
      <div class="card">

        <h2>공유</h2>

        <br>

        <div class="share-box">
          <div class="btn">프리셋 JPG 저장</div>
          <div class="btn">링크 복사</div>
          <div class="btn">룩 공유</div>
        </div>

      </div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="section">

      <div class="card">

        <h2>내 프로필</h2>

        <input type="file" id="profileImage">

        <img
          id="previewImage"
          src="https://via.placeholder.com/100"
        >

        <input
          type="text"
          id="name"
          placeholder="이름">

        <input
          type="number"
          id="age"
          placeholder="나이">

        <input
          type="text"
          id="feature"
          placeholder="특징">

        <textarea
          id="memo"
          placeholder="메모">
        </textarea>

        <div class="btn"
          onclick="saveProfile()">
          저장
        </div>

      </div>
    </div>

  </div>
</div>

<!-- PROFILE IMAGE MODAL -->
<div class="modal" id="imageModal">

  <div class="modal-content"
    style="max-width:320px;text-align:center;">

    <img
      id="modalImg"
      class="center-profile-image">

  </div>
</div>

<!-- CLOTH MODAL -->
<div class="modal" id="clothModal">

  <div class="modal-content">

    <button class="close"
      onclick="closeModal('clothModal')">
      ×
    </button>

    <div style="display:flex;gap:20px;flex-wrap:wrap;">

      <div style="flex:1;min-width:250px;">
        <img
          id="clothModalImg"
          style="width:100%;height:320px;object-fit:contain;background:#f5f5f5;border-radius:16px;">
      </div>

      <div style="flex:1;min-width:250px;">

        <input id="editName">

        <select id="editCategory">
          <option value="상의">상의</option>
          <option value="하의">하의</option>
          <option value="아우터">아우터</option>
          <option value="신발">신발</option>
          <option value="악세서리">악세서리</option>
        </select>

        <input id="editBrand">

        <select id="editSize">
          <option>XXS</option>
          <option>XS</option>
          <option>S</option>
          <option>M</option>
          <option>L</option>
          <option>XL</option>
          <option>XXL</option>
          <option>XXXL</option>
        </select>

        <textarea id="editDetailSize"></textarea>

        <input id="editLink">

        <textarea id="editMemo"></textarea>

        <div class="btn"
          onclick="saveEdit()">
          저장
        </div>

        <div class="btn"
          onclick="deleteCloth()">
          삭제
        </div>

      </div>

    </div>

  </div>
</div>

<!-- PRESET BUILDER -->
<div class="modal" id="presetBuilderModal">

  <div class="modal-content">

    <button class="close"
      onclick="closeModal('presetBuilderModal')">
      ×
    </button>

    <h2>프리셋 구성</h2>

    <div class="slot-grid">

      <div class="slot" data-category="상의">
        <h4>상의</h4>
        <div class="slot-items"></div>
      </div>

      <div class="slot" data-category="하의">
        <h4>하의</h4>
        <div class="slot-items"></div>
      </div>

      <div class="slot" data-category="아우터">
        <h4>아우터</h4>
        <div class="slot-items"></div>
      </div>

      <div class="slot" data-category="신발">
        <h4>신발</h4>
        <div class="slot-items"></div>
      </div>

      <div class="slot" data-category="악세서리">
        <h4>악세서리</h4>
        <div class="slot-items"></div>
      </div>

    </div>

    <br>

    <div id="builderClothes"
      class="grid">
    </div>

    <div class="btn"
      onclick="savePreset()">
      프리셋 저장
    </div>

  </div>
</div>

<!-- PRESET MODAL -->
<div class="modal" id="presetModal">

  <div class="modal-content">

    <button class="close"
      onclick="closeModal('presetModal')">
      ×
    </button>

    <h2 id="presetTitle"></h2>

    <br>

    <div id="presetItems"
      class="grid">
    </div>

  </div>
</div>

<script>
let selectedIndex=null;
let currentFilter="전체";
let favoriteOnly=false;

let presetSelection={
  상의:null,
  하의:null,
  아우터:null,
  신발:null,
  악세서리:null
};

/* SECTION */
function showSection(id,el){

  document.querySelectorAll('.section')
    .forEach(s=>s.classList.remove('active'));

  document.getElementById(id)
    .classList.add('active');

  document.querySelectorAll('.menu')
    .forEach(m=>m.classList.remove('active'));

  if(el) el.classList.add('active');
}

/* PROFILE 이동 */
function goProfile(){

  showSection('profile');

  document.querySelectorAll('.menu')
    .forEach(m=>m.classList.remove('active'));

  document.querySelectorAll('.menu')[5]
    .classList.add('active');
}

/* PROFILE IMAGE */
function openProfileImage(){

  modalImg.src=headerProfileImg.src;

  imageModal.classList.add('active');
}

/* CLOSE MODAL */
function closeModal(id){
  document.getElementById(id)
    .classList.remove('active');
}

/* OUTSIDE CLICK */
document.querySelectorAll('.modal')
.forEach(modal=>{

  modal.addEventListener('click',e=>{

    if(e.target===modal){
      modal.classList.remove('active');
    }

  });

});

/* PREVIEW */
profileImage.onchange=e=>{

  const r=new FileReader();

  r.onload=()=>{
    previewImage.src=r.result;
  };

  r.readAsDataURL(e.target.files[0]);
};

clothImage.onchange=e=>{

  const r=new FileReader();

  r.onload=()=>{

    clothPreview.src=r.result;
    clothPreview.style.display='block';

  };

  r.readAsDataURL(e.target.files[0]);
};

/* SAVE PROFILE */
function saveProfile(){

  const profileData={

    name:document.getElementById('name').value || '내 프로필',

    age:document.getElementById('age').value,

    feature:document.getElementById('feature').value,

    memo:document.getElementById('memo').value,

    image:previewImage.src

  };

  localStorage.setItem(
    'profile',
    JSON.stringify(profileData)
  );

  headerName.innerText=profileData.name;
  headerProfileImg.src=profileData.image;

  alert('프로필 저장 완료');
}

/* ADD CLOTH */
function addCloth(){

  const file=clothImage.files[0];

  if(!file){
    alert('이미지를 선택하세요');
    return;
  }

  const r=new FileReader();

  r.onload=()=>{

    const cloth={

      id:Date.now(),

      name:clothName.value,

      category:clothCategory.value,

      brand:clothBrand.value,

      size:clothSize.value,

      detailSize:clothDetailSize.value,

      link:clothLink.value,

      memo:clothMemo.value,

      favorite:false,

      image:r.result

    };

    let clothes=
      JSON.parse(localStorage.getItem('clothes'))||[];

    clothes.push(cloth);

    localStorage.setItem(
      'clothes',
      JSON.stringify(clothes)
    );

    renderClothes();

    alert('등록 완료');

  };

  r.readAsDataURL(file);
}

/* FILTER */
function filterCategory(category,el){

  currentFilter=category;
  favoriteOnly=false;

  document.querySelectorAll('.filter-btn')
    .forEach(b=>b.classList.remove('active'));

  el.classList.add('active');

  renderClothes();
}

function showFavorites(el){

  favoriteOnly=true;

  document.querySelectorAll('.filter-btn')
    .forEach(b=>b.classList.remove('active'));

  el.classList.add('active');

  renderClothes();
}

/* RENDER CLOTHES */
function renderClothes(){

  closetGrid.innerHTML='';

  let clothes=
    JSON.parse(localStorage.getItem('clothes'))||[];

  if(currentFilter!=='전체'){

    clothes=
      clothes.filter(c=>c.category===currentFilter);

  }

  if(favoriteOnly){

    clothes=
      clothes.filter(c=>c.favorite);

  }

  clothes.forEach((c,i)=>{

    const div=document.createElement('div');

    div.className='item';

    div.innerHTML=`

      <div class="favorite">
        ${c.favorite?'★':'☆'}
      </div>

      <button class="delete-btn">
        ×
      </button>

      <img src="${c.image}">

      <div class="item-info">

        <div class="item-title">
          ${c.name}
        </div>

        <div class="item-sub">
          ${c.category}
        </div>

      </div>
    `;

    div.onclick=()=>openCloth(i);

    div.querySelector('.delete-btn')
    .onclick=(e)=>{

      e.stopPropagation();

      let clothes=
        JSON.parse(localStorage.getItem('clothes'))||[];

      clothes.splice(i,1);

      localStorage.setItem(
        'clothes',
        JSON.stringify(clothes)
      );

      renderClothes();
    };

    div.querySelector('.favorite')
    .onclick=(e)=>{

      e.stopPropagation();

      let clothes=
        JSON.parse(localStorage.getItem('clothes'))||[];

      clothes[i].favorite=!clothes[i].favorite;

      localStorage.setItem(
        'clothes',
        JSON.stringify(clothes)
      );

      renderClothes();

    };

    closetGrid.appendChild(div);

  });
}

/* OPEN CLOTH */
function openCloth(index){

  selectedIndex=index;

  let clothes=
    JSON.parse(localStorage.getItem('clothes'))||[];

  let c=clothes[index];

  clothModalImg.src=c.image;

  editName.value=c.name;
  editCategory.value=c.category;
  editBrand.value=c.brand;
  editSize.value=c.size;
  editDetailSize.value=c.detailSize;
  editLink.value=c.link;
  editMemo.value=c.memo;

  clothModal.classList.add('active');
}

/* SAVE EDIT */
function saveEdit(){

  let clothes=
    JSON.parse(localStorage.getItem('clothes'))||[];

  clothes[selectedIndex]={

    ...clothes[selectedIndex],

    name:editName.value,
    category:editCategory.value,
    brand:editBrand.value,
    size:editSize.value,
    detailSize:editDetailSize.value,
    link:editLink.value,
    memo:editMemo.value

  };

  localStorage.setItem(
    'clothes',
    JSON.stringify(clothes)
  );

  renderClothes();

  closeModal('clothModal');
}

/* DELETE */
function deleteCloth(){

  let clothes=
    JSON.parse(localStorage.getItem('clothes'))||[];

  clothes.splice(selectedIndex,1);

  localStorage.setItem(
    'clothes',
    JSON.stringify(clothes)
  );

  renderClothes();

  closeModal('clothModal');
}

/* PRESET BUILDER */
function openPresetBuilder(){

  presetBuilderModal.classList.add('active');

  renderBuilderClothes();
}

function renderBuilderClothes(){

  builderClothes.innerHTML='';

  let clothes=
    JSON.parse(localStorage.getItem('clothes'))||[];

  clothes.forEach(c=>{

    const div=document.createElement('div');

    div.className='item';

    div.innerHTML=`

      <img src="${c.image}">

      <div class="item-info">

        <div class="item-title">
          ${c.name}
        </div>

        <div class="item-sub">
          ${c.category}
        </div>

      </div>
    `;

    div.onclick=()=>{

      presetSelection[c.category]=c;

      renderSlots();
    };

    builderClothes.appendChild(div);

  });
}

/* SLOT */
function renderSlots(){

  document.querySelectorAll('.slot')
  .forEach(slot=>{

    const category=
      slot.dataset.category;

    const wrap=
      slot.querySelector('.slot-items');

    wrap.innerHTML='';

    const item=
      presetSelection[category];

    if(item){

      wrap.innerHTML=`
        <img src="${item.image}">
        <p style="margin-top:8px;">
          ${item.name}
        </p>
      `;
    }

  });
}

/* SAVE PRESET */
function savePreset(){

  const name=
    presetName.value.trim();

  if(!name){

    alert('프리셋 이름 입력');
    return;
  }

  const items=
    Object.values(presetSelection)
    .filter(v=>v);

  if(items.length===0){

    alert('옷을 선택하세요');
    return;
  }

  const presetImg=
    document.getElementById('presetImage').files[0];

  function finalSave(imageSrc){

    let presets=
      JSON.parse(localStorage.getItem('presets'))||[];

    presets.push({

      id:Date.now(),

      name:name,

      image:imageSrc ||

      (items[0]?.image),

      items:items

    });

    localStorage.setItem(
      'presets',
      JSON.stringify(presets)
    );

    renderPresets();

    closeModal('presetBuilderModal');

    alert('프리셋 저장 완료');
  }

  if(presetImg){

    const r=new FileReader();

    r.onload=()=>{
      finalSave(r.result);
    };

    r.readAsDataURL(presetImg);

  }else{

    finalSave(null);

  }
}

/* RENDER PRESET */
function renderPresets(){

  presetList.innerHTML='';

  let presets=
    JSON.parse(localStorage.getItem('presets'))||[];

  presets.forEach((p,index)=>{

    const div=document.createElement('div');

    div.className='preset-card';

    div.innerHTML=`

      <button class="delete-btn">
        ×
      </button>

      <img
        class="preset-cover"
        src="${p.image}">

      <div class="preset-body">

        <div class="preset-name">
          ${p.name}
        </div>

        <div class="preset-meta">
          ${p.items.length}개 아이템
        </div>

      </div>
    `;

    div.onclick=()=>openPreset(index);

    div.querySelector('.delete-btn')
    .onclick=(e)=>{

      e.stopPropagation();

      let presets=
        JSON.parse(localStorage.getItem('presets'))||[];

      presets.splice(index,1);

      localStorage.setItem(
        'presets',
        JSON.stringify(presets)
      );

      renderPresets();
    };

    presetList.appendChild(div);

  });
}

/* OPEN PRESET */
function openPreset(index){

  let presets=
    JSON.parse(localStorage.getItem('presets'))||[];

  let p=presets[index];

  presetTitle.innerText=p.name;

  presetItems.innerHTML='';

  p.items.forEach(item=>{

    const div=document.createElement('div');

    div.className='item';

    div.innerHTML=`

      <img src="${item.image}">

      <div class="item-info">

        <div class="item-title">
          ${item.name}
        </div>

        <div class="item-sub">
          ${item.category}
        </div>

      </div>
    `;

    div.onclick=()=>{

      clothModalImg.src=item.image;

      editName.value=item.name;
      editCategory.value=item.category;
      editBrand.value=item.brand;
      editSize.value=item.size;
      editDetailSize.value=item.detailSize;
      editLink.value=item.link;
      editMemo.value=item.memo;

      clothModal.classList.add('active');
    };

    presetItems.appendChild(div);

  });

  presetModal.classList.add('active');
}

/* INIT */
window.onload=()=>{

  renderClothes();

  renderPresets();

  const p=
    JSON.parse(localStorage.getItem('profile'));

  if(p){

    headerName.innerText=
      p.name || '내 프로필';

    headerProfileImg.src=
      p.image || 'https://via.placeholder.com/100';

    previewImage.src=
      p.image || 'https://via.placeholder.com/100';

    name.value=p.name || '';
    age.value=p.age || '';
    feature.value=p.feature || '';
    memo.value=p.memo || '';
  }
};
